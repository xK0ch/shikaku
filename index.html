<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikaku</title>
    <link data-trunk rel="rust"/>
    <style>
        :root {
            --cell-size: 56px;
            --board-bg: #fafafa;
            --cell-bg: #ffffff;
            --grid-line: #c8c8c8;
            --grid-border: #2a2a2a;
            --text: #222;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: var(--board-bg);
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem 1rem;
        }

        h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .board {
            display: grid;
            gap: 0;
            border: 2px solid var(--grid-border);
            background: var(--grid-line);
        }

        .cell {
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: calc(var(--cell-size) * 0.45);
            font-weight: 500;
            user-select: none;
            margin: 1px;
            cursor: crosshair;
            transition: background 80ms ease-out;
        }

        .controls {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .size-picker {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.95rem;
        }

        .size-picker select {
            font: inherit;
            padding: 0.35rem 0.6rem;
            border: 1px solid var(--grid-border);
            border-radius: 4px;
            background: var(--cell-bg);
            cursor: pointer;
        }

        .status {
            min-height: 1.5rem;
            font-size: 0.95rem;
        }

        .error {
            color: #b3261e;
        }

        .success {
            color: #1f7a3a;
            font-weight: 600;
            font-size: 1.1rem;
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        button.btn {
            font: inherit;
            padding: 0.5rem 1.25rem;
            border: 1px solid var(--grid-border);
            background: var(--cell-bg);
            border-radius: 4px;
            cursor: pointer;
        }

        button.btn:hover {
            background: #f0f0f0;
        }
    </style>
</head>
<body></body>
</html>
