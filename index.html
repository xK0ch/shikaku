<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikaku</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..900;1,9..144,300..900&family=JetBrains+Mono:wght@400;500;700&display=swap">
    <link data-trunk rel="rust"/>
    <style>
        :root {
            --cell-size: 56px;

            --paper: #f1ebdc;
            --paper-deep: #e6dec8;
            --ink: #1c1812;
            --ink-soft: #5e5240;
            --ink-faint: #9a8c75;
            --rule: #c8bba0;
            --cell-bg: #fbf6e7;
            --cell-grid: #c9bb9c;
            --vermillion: #c8412a;
            --vermillion-deep: #9c2f1c;

            --serif: 'Fraunces', 'Hoefler Text', Georgia, serif;
            --mono: 'JetBrains Mono', 'Menlo', 'Consolas', monospace;
            --cjk: 'Hiragino Mincho ProN', 'Yu Mincho', 'YuMincho', 'MS Mincho', serif;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: var(--serif);
            color: var(--ink);
            background: var(--paper);
            -webkit-font-smoothing: antialiased;
            text-rendering: optimizeLegibility;
        }

        /* Paper grain overlay */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 100;
            opacity: 0.45;
            mix-blend-mode: multiply;
            background-image: url("data:image/svg+xml;utf8,<svg viewBox='0 0 240 240' xmlns='http://www.w3.org/2000/svg'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.95' numOctaves='2' stitchTiles='stitch'/><feColorMatrix values='0 0 0 0 0.07 0 0 0 0 0.05 0 0 0 0 0.03 0 0 0 0.16 0'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
        }

        /* Faint kanji watermark */
        body::after {
            content: '四';
            position: fixed;
            font-family: var(--cjk);
            font-size: 60vmin;
            font-weight: 400;
            color: var(--ink);
            opacity: 0.025;
            right: -8vmin;
            bottom: -16vmin;
            line-height: 1;
            pointer-events: none;
            z-index: 0;
            user-select: none;
        }

        main {
            position: relative;
            z-index: 2;
            max-width: 68rem;
            margin: 0 auto;
            padding: 4rem 2rem 5rem;
            display: grid;
            gap: 2.5rem;
        }

        /* Masthead */
        .masthead {
            display: grid;
            grid-template-columns: auto 1fr;
            align-items: end;
            gap: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--ink);
            box-shadow: 0 2px 0 -1px var(--ink);
            position: relative;
        }

        .kanji {
            font-family: var(--cjk);
            font-size: clamp(3rem, 8vw, 5.5rem);
            font-weight: 500;
            line-height: 0.85;
            color: var(--vermillion);
            letter-spacing: -0.04em;
            user-select: none;
            margin: 0;
            animation: drop-in 700ms cubic-bezier(0.2, 0.7, 0.2, 1) both;
        }

        h1 {
            margin: 0;
            font-family: var(--serif);
            font-size: clamp(3.25rem, 11vw, 7.5rem);
            font-style: italic;
            font-weight: 300;
            font-variation-settings: 'opsz' 144;
            line-height: 0.82;
            letter-spacing: -0.045em;
            color: var(--ink);
            animation: fade-rise 800ms cubic-bezier(0.2, 0.7, 0.2, 1) 100ms both;
        }

        .tagline {
            grid-column: 1 / -1;
            margin: 1.25rem 0 0;
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 400;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            color: var(--ink-soft);
            animation: fade-rise 800ms cubic-bezier(0.2, 0.7, 0.2, 1) 250ms both;
        }

        .tagline .dot {
            display: inline-block;
            width: 4px;
            height: 4px;
            background: var(--vermillion);
            border-radius: 50%;
            margin: 0 0.85em 0.15em;
            vertical-align: middle;
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1.25rem;
            padding: 0.5rem 0 1.25rem;
            border-bottom: 1px solid var(--rule);
            animation: fade-rise 800ms cubic-bezier(0.2, 0.7, 0.2, 1) 350ms both;
        }

        .size-picker {
            display: inline-flex;
            align-items: center;
            gap: 1rem;
            font-family: var(--mono);
            font-size: 0.65rem;
            text-transform: uppercase;
            letter-spacing: 0.28em;
            color: var(--ink-soft);
        }

        .size-picker select {
            font-family: var(--mono);
            font-size: 0.85rem;
            font-weight: 500;
            text-transform: none;
            letter-spacing: 0;
            color: var(--ink);
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--ink);
            padding: 0.3rem 1.5rem 0.3rem 0;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 12 8'><path d='M1 1l5 5 5-5' stroke='%231c1812' stroke-width='1.5' fill='none' stroke-linecap='square'/></svg>");
            background-repeat: no-repeat;
            background-position: right 0.1rem center;
            background-size: 10px;
            transition: border-color 200ms;
        }

        .size-picker select:focus {
            outline: none;
            border-bottom-color: var(--vermillion);
        }

        .actions {
            display: flex;
            gap: 0.5rem;
        }

        button.btn {
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.18em;
            color: var(--ink);
            background: transparent;
            border: 1px solid var(--ink);
            padding: 0.7rem 1.4rem;
            cursor: pointer;
            transition: background 180ms, color 180ms, transform 100ms;
            position: relative;
        }

        button.btn:hover {
            background: var(--ink);
            color: var(--paper);
        }

        button.btn:active {
            transform: translateY(1px);
        }

        button.btn:focus-visible,
        .size-picker select:focus-visible {
            outline: 2px solid var(--vermillion);
            outline-offset: 3px;
        }

        /* Board */
        .board-stage {
            display: flex;
            justify-content: center;
            padding: 1rem 0 1.5rem;
            overflow-x: auto;
            animation: fade-rise 800ms cubic-bezier(0.2, 0.7, 0.2, 1) 450ms both;
        }

        .board-frame {
            position: relative;
            padding: 14px;
        }

        .board-frame::before {
            content: '';
            position: absolute;
            inset: 0;
            border: 1px solid var(--vermillion);
            pointer-events: none;
        }

        .board-frame::after {
            content: '四角';
            position: absolute;
            font-family: var(--cjk);
            font-size: 0.62rem;
            letter-spacing: 0.4em;
            color: var(--vermillion);
            top: -0.55rem;
            left: 50%;
            transform: translateX(-50%);
            background: var(--paper);
            padding: 0 0.6rem;
            line-height: 1;
        }

        .board {
            display: grid;
            gap: 0;
            border: 2px solid var(--ink);
            background: var(--cell-grid);
            position: relative;
        }

        .cell {
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: var(--mono);
            font-size: calc(var(--cell-size) * 0.42);
            font-weight: 500;
            font-feature-settings: 'tnum';
            color: var(--ink);
            user-select: none;
            margin: 1px;
            cursor: crosshair;
            transition: background 100ms ease-out;
            position: relative;
        }

        .cell:hover {
            background: #f4ecd1;
        }

        /* Status */
        .status {
            min-height: 3rem;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: var(--serif);
        }

        .success {
            font-style: italic;
            font-size: 2.75rem;
            font-weight: 400;
            font-variation-settings: 'opsz' 144;
            color: var(--vermillion);
            letter-spacing: -0.025em;
            line-height: 1;
            position: relative;
            padding: 0.1em 0.4em 0.2em;
            animation: stamp 650ms cubic-bezier(0.34, 1.56, 0.64, 1) both;
            transform-origin: center;
        }

        .success::before,
        .success::after {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--vermillion);
        }
        .success::before { top: 0; }
        .success::after { bottom: 0; }

        .error {
            font-style: italic;
            font-size: 1.05rem;
            color: var(--ink-soft);
            text-align: center;
            max-width: 32rem;
            padding: 0 1rem;
        }

        /* Rules */
        .rules {
            display: grid;
            grid-template-columns: 14rem 1fr;
            gap: 3rem;
            padding: 2rem 0 0;
            border-top: 1px solid var(--rule);
        }

        .rules h2 {
            margin: 0;
            font-family: var(--mono);
            font-size: 0.7rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.32em;
            color: var(--ink-soft);
            line-height: 1.4;
        }

        .rules h2::after {
            content: '';
            display: block;
            width: 2rem;
            height: 1px;
            background: var(--vermillion);
            margin-top: 0.75rem;
        }

        .rules ol {
            list-style: none;
            margin: 0;
            padding: 0;
            counter-reset: rule;
        }

        .rules li {
            counter-increment: rule;
            font-family: var(--serif);
            font-size: 1.1rem;
            font-style: italic;
            font-weight: 400;
            line-height: 1.5;
            color: var(--ink);
            padding: 0.85rem 0 0.85rem 3.25rem;
            position: relative;
            border-top: 1px solid var(--rule);
        }

        .rules li:first-child {
            border-top: none;
            padding-top: 0;
        }

        .rules li:first-child::before {
            top: 0.05rem;
        }

        .rules li::before {
            content: counter(rule, decimal-leading-zero);
            position: absolute;
            left: 0;
            top: 0.95rem;
            font-family: var(--mono);
            font-size: 0.78rem;
            font-style: normal;
            font-weight: 500;
            color: var(--vermillion);
            letter-spacing: 0.08em;
        }

        /* Animations */
        @keyframes fade-rise {
            from { opacity: 0; transform: translateY(14px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes drop-in {
            from { opacity: 0; transform: translateY(-14px) scale(0.94); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        @keyframes stamp {
            0%   { opacity: 0; transform: scale(1.5) rotate(-6deg); }
            55%  { opacity: 1; transform: scale(0.93) rotate(1deg); }
            100% { transform: scale(1) rotate(0); }
        }

        /* Responsive */
        @media (max-width: 720px) {
            main { padding: 2.5rem 1.25rem 4rem; gap: 2rem; }
            .masthead { gap: 0.85rem; }
            .toolbar { gap: 1rem; }
            .rules { grid-template-columns: 1fr; gap: 1.25rem; }
            .success { font-size: 2.1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            * { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body></body>
</html>
