<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shikaku</title>
    <link data-trunk rel="rust"/>
    <style>
        :root {
            --cell-size: 56px;
            --board-bg: #fafafa;
            --cell-bg: #ffffff;
            --grid-line: #c8c8c8;
            --grid-border: #2a2a2a;
            --text: #222;
        }

        * { box-sizing: border-box; }

        html, body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text);
            background: var(--board-bg);
        }

        main {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            padding: 2rem 1rem;
        }

        h1 {
            margin: 0;
            font-weight: 600;
            letter-spacing: 0.02em;
        }

        .board {
            display: grid;
            gap: 0;
            border: 2px solid var(--grid-border);
            background: var(--grid-line);
        }

        .cell {
            background: var(--cell-bg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 500;
            user-select: none;
            margin: 1px;
        }
    </style>
</head>
<body></body>
</html>
